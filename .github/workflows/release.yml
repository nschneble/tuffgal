name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - name: check whether version is already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view tuffgal versions --json 2>/dev/null || echo "[]")
          if echo "$PUBLISHED" | jq -e --arg v "$VERSION" 'index($v)' > /dev/null; then
            echo "tuffgal@$VERSION already on npm — skipping publish + gh-release"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "tuffgal@$VERSION not yet on npm — proceeding"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public --tag alpha
      - if: steps.check.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
